<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="منظومة إدارة النخب الشبابية - النسخة السابعة عشر المطورة">
    <meta name="author" content="Arkan Al-Badri">
    <title>منظومة النخب | Arkan Master V17 Pro Plus</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap');
        
        :root {
            --primary-color: #064e3b; 
            --admin-bg: #020617; 
            --accent-gold: #fbbf24;
            --danger-red: #e11d48;
            --soft-slate: #f8fafc;
            --glass-white: rgba(255, 255, 255, 0.05);
            --notification-green: #10b981;
        }

        html { font-size: 14px; }
        @media (min-width: 640px) { html { font-size: 16px; } }
        
        * { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Tajawal', sans-serif; 
            box-sizing: border-box; 
            outline: none !important;
            user-select: none;
        }

        body { 
            background-color: var(--soft-slate); 
            margin: 0; 
            overflow-x: hidden; 
            color: #1e293b;
            line-height: 1.5;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            background: white;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        h1, h2, h3 { letter-spacing: -0.02em; }
        .text-huge { font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 900; }
        .text-standard { font-size: 0.95rem; font-weight: 600; }
        .text-tiny { font-size: 0.75rem; font-weight: 800; }

        .elite-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #f1f5f9;
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
        }
        .elite-card:active { transform: scale(0.98); }

        #notification-center {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 10000;
            pointer-events: none;
        }
        .notif-toast {
            background: var(--primary-color);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1.2rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideInDown 0.5s forwards, fadeOut 0.5s 3.5s forwards;
            pointer-events: auto;
        }

        .admin-view {
            background: var(--admin-bg);
            color: white;
            min-height: 100vh;
        }
        .glass-ui {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.8rem;
        }

        .nav-dock {
            position: fixed;
            bottom: 0;
            max-width: 500px;
            width: 100%;
            height: 80px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            display: flex;
            border-top: 1px solid #f1f5f9;
            z-index: 5000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 0.7rem;
            font-weight: 800;
            transition: 0.3s;
        }
        .nav-btn.active { color: var(--primary-color); }
        .nav-btn i { font-size: 1.4rem; margin-bottom: 4px; }

        .admin-action-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .chat-area {
            background: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
        .msg-bubble {
            max-width: 80%;
            padding: 1rem;
            border-radius: 1.5rem;
            margin-bottom: 0.8rem;
            font-size: 0.9rem;
            font-weight: 600;
            position: relative;
        }
        .msg-me { background: var(--primary-color); color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
        .msg-them { background: white; color: #334155; align-self: flex-start; border-bottom-left-radius: 0.2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .master-loader {
            position: fixed; inset: 0; background: white; z-index: 99999;
            display: flex; flex-direction: column; items-center justify-center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f1f5f9;
            border-top-color: var(--primary-color); border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input, textarea { font-size: 1rem !important; }

        .excel-tool-btn {
            background: #15803d;
            color: white;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }
        .excel-tool-btn:hover { background: #166534; }

        .admin-note-box {
            background: rgba(251, 191, 36, 0.1);
            border: 1px dashed #fbbf24;
            padding: 10px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .notif-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger-red);
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 20px;
            border: 2px solid white;
            font-weight: 900;
            animation: pulse-badge 1.5s infinite;
            z-index: 100;
        }

        @keyframes pulse-badge {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }
        
        .room-relative { position: relative; }

        /* تمديد الكود بستايلات إضافية */
        .delete-btn-hover:hover { color: #ff4d4d !important; }
        .message-timestamp { font-size: 7px; color: rgba(255,255,255,0.5); margin-top: 4px; display: block; }
        .admin-trash-trigger {
            opacity: 0;
            transition: 0.3s;
            cursor: pointer;
        }
        .msg-bubble:hover .admin-trash-trigger { opacity: 1; }
    </style>
</head>
<body>

    <script>
        // --- 1. الإعدادات الأساسية ---
        const firebaseConfig = { databaseURL: "https://arkanlab-99711-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const ROOT_CODE = "79917991";
        let state = {
            user: null,
            isAdmin: false,
            tempFiles: {},
            activeRoom: null,
            allUsers: {},
            lastNewsTime: Date.now(),
            lastMsgTime: Date.now(),
            unreadCounts: {},
            lastSeen: JSON.parse(localStorage.getItem('arkan_last_seen') || "{}"),
            notifSound: new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3')
        };

        // --- 2. التحكم في الشاشة والتحميل ---
        window.onload = () => {
            const cached = localStorage.getItem('arkan_session_v17');
            
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }

            setTimeout(() => {
                const loader = document.getElementById('loader-screen');
                loader.classList.add('animate__fadeOut');
                setTimeout(() => {
                    loader.style.display = 'none';
                    if (cached) {
                        state.user = JSON.parse(cached);
                        state.isAdmin = (state.user.role === 'admin');
                        bootApp();
                    }
                }, 500);
            }, 2000);
        };

        // --- 3. نظام الإشعارات المطور ---
        function showNotif(text, type = 'info') {
            const center = document.getElementById('notification-center');
            const toast = document.createElement('div');
            toast.className = 'notif-toast';
            toast.innerHTML = `<i class="fa-solid fa-bell"></i> <span class="text-xs font-black">${text}</span>`;
            center.appendChild(toast);
            
            state.notifSound.play().catch(() => {});

            if (navigator.vibrate) navigator.vibrate(100);

            setTimeout(() => {
                toast.classList.add('animate__fadeOut');
                setTimeout(() => toast.remove(), 500);
            }, 3500);
        }

        function triggerExternalNotif(title, body) {
            if (Notification.permission === "granted") {
                const n = new Notification(title, { 
                    body, 
                    icon: 'https://cdn-icons-png.flaticon.com/512/1041/1041916.png',
                    badge: 'https://cdn-icons-png.flaticon.com/512/1041/1041916.png'
                });
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            }
        }

        // --- 4. معالجة الدخول ---
        async function processAuth() {
            const phoneInput = document.getElementById('input-auth-phone');
            const phone = phoneInput.value.trim();
            if (!phone) return showNotif("أدخل رقم الهاتف أولاً");

            if (phone === ROOT_CODE) {
                state.user = { name: "أركان البدري", phone: "ADMIN_ROOT", role: "admin" };
                state.isAdmin = true;
                saveAndBoot();
                return;
            }

            const cleanPhone = phone.startsWith('0') ? '964' + phone.substring(1) : phone;
            const snap = await db.ref('users/' + cleanPhone).once('value');

            if (snap.exists()) {
                const userData = snap.val();
                if (userData.status === 'pending') {

        async function submitNewUser(phone) {
            const name = document.getElementById('reg-name').value;
            const job = document.getElementById('reg-job').value;
            const idImg = state.tempFiles['id_img'];

            if (!name || !job || !idImg) return showNotif("أكمل كافة البيانات وصورة الهوية");

            await db.ref('users/' + phone).set({
                phone, name, job, idImg,
                role: 'user', status: 'pending', joined: Date.now(), 
                allowedRooms: [], canPost: false, adminNote: ""
            });
            
            showNotif("تم إرسال الطلب، بانتظار موافقة الإدارة");

            localStorage.setItem('arkan_session_v17', JSON.stringify(state.user));

        // --- 5. تشغيل واجهات النظام ---
        function bootApp() {
            document.getElementById('view-auth').classList.add('hidden');
            if (state.isAdmin) {
                document.getElementById('view-admin').classList.remove('hidden');
                initAdminEngine();
                initAdminNewsArchive();
            } else {
                document.getElementById('view-member').classList.remove('hidden');
                document.getElementById('member-name-display').innerText = state.user.name;
                document.getElementById('member-avatar').innerText = state.user.name[0];
                initMemberEngine();
                initRealtimePermissionSync();
            }
            initNotificationListeners();
            initGlobalChatWatchers();
        }

                function initGlobalChatWatchers() {
            db.ref('rooms').on('value', snap => {
                snap.forEach(roomSnap => {
                    const roomId = roomSnap.key;
                    const roomTitle = roomSnap.val().title;
                    
                    const hasAccess = state.isAdmin || (state.user.allowedRooms && state.user.allowedRooms.includes(roomId));
                    if (!hasAccess) return;

                    db.ref('messages/' + roomId).on('value', msgSnap => {
                        let count = 0;
                        const lastSeenTime = state.lastSeen[roomId] || 0;
                        let latestMsg = null;

                        msgSnap.forEach(m => {
                            const msg = m.val();
                            if (msg.time > lastSeenTime && msg.phone !== state.user.phone) {
                                count++;
                                latestMsg = msg;
                            }
                        });

                        state.unreadCounts[roomId] = count;
                        updateUnreadUI(roomId, count); // تحديث العلامة الحمراء
                        
                        // إطلاق إشعار إذا التطبيق مفتوح والرسالة جديدة
                        if (count > 0 && state.activeRoom !== roomId && latestMsg && latestMsg.time > state.lastMsgTime) {
                            if (document.visibilityState !== 'visible' || state.activeRoom !== roomId) {
                                triggerExternalNotif(`رسالة في ${roomTitle}`, `${latestMsg.sender}: ${latestMsg.text}`);
                                new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3').play().catch(()=>{});
                            }
                            state.lastMsgTime = latestMsg.time;
                        }
                    });
                });
            });
        }

                function updateUnreadUI(roomId, count) {
            // أولاً: تحديث العداد بجانب اسم الغرفة داخل القائمة
            const badges = document.querySelectorAll(`[id="badge-${roomId}"]`);
            badges.forEach(badge => {
                if (count > 0) {
                    badge.innerText = count;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            });
            
            // ثانياً: تحديث العداد الكلي فوق أيقونة الدردشة بالأسفل (الرقم الأحمر العام)
            // نجمع كل التنبيهات من كل الغرف ونعرضها بالأسفل فوراً
            const total = Object.values(state.unreadCounts).reduce((a, b) => a + b, 0);
            const globalBadge = document.getElementById('global-unread-badge');
            if (globalBadge) {
                if (total > 0) {
                    globalBadge.innerText = total;
                    globalBadge.classList.remove('hidden');
                    // إضافة حركة اهتزاز بسيطة للفت الانتباه
                    globalBadge.classList.add('animate-bounce');
                } else {
                    globalBadge.classList.add('hidden');
                }
            }
        }

        function exportUsersToExcel() {
            const data = [];
            Object.values(state.allUsers).forEach(u => {

            });
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "الأعضاء");
            XLSX.writeFile(workbook, `نخب_ذي_قار_${new Date().toLocaleDateString()}.xlsx`);
        }

        function importUsersFromExcel(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(sheet);
                    for (let row of rows) {
                        const phone = String(row["رقم الهاتف"] || row["الهاتف"] || "");
                        if (phone) {
                            const cleanPhone = phone.startsWith('0') ? '964' + phone.substring(1) : phone;
                            await db.ref('users/' + cleanPhone).update({
                                phone: cleanPhone, name: row["الاسم الكامل"] || "بدون اسم", 
                                job: row["المسمى الوظيفي"] || "عضو",
                                role: 'user', status: 'active', joined: Date.now()
                            });
                        }
                    }
                    showNotif("تم استيراد البيانات بنجاح");
                } catch(err) { showNotif("فشل الاستيراد: تأكد من صيفة الملف"); }
            };
            reader.readAsArrayBuffer(file);
        }

                function closeChat() {
            if (state.activeRoom) {
                // تحديث وقت آخر مشاهدة للغرفة الحالية بلحظة الخروج
                const now = Date.now();
                state.lastSeen[state.activeRoom] = now;

                // تصفير العداد للغرفة اللي جنت بيها حتى ما يبقى معلق
                state.unreadCounts[state.activeRoom] = 0;

                // إيقاف مراقبة الرسائل لهذي الغرفة مؤقتاً لتوفير البطارية والبيانات
                db.ref('messages/' + state.activeRoom).off();

        function approveUser(key) {

            showNotif("تم تفعيل العضو");
        }

        async function managePerms(ukey, uname) {
            const rSnap = await db.ref('rooms').once('value');
            const uSnap = await db.ref('users/' + ukey + '/allowedRooms').once('value');
            let allowed = uSnap.val() || [];
            let rKeys = []; let i = 1; let menu = `صلاحيات ${uname}:\n\n`;
            rSnap.forEach(r => { 
                menu += `${i}- ${r.val().title} [${allowed.includes(r.key) ? '✅' : '❌'}]\n`; 
                rKeys.push(r.key); i++; 
            });
            const choice = prompt(menu + "\nأدخل الرقم للتبديل (0 للحفظ):");
            if (choice && choice != "0" && rKeys[choice-1]) {
                const target = rKeys[choice-1];
                if (allowed.includes(target)) allowed = allowed.filter(k => k !== target);
                else allowed.push(target);
                await db.ref('users/' + ukey).update({ allowedRooms: allowed });
                managePerms(ukey, uname); 
            }
        }

        async function sendReply(key) {
            const r = prompt("اكتب الرد الرسمي:");
            if (r) await db.ref('orders/' + key).update({ reply: r });
        }

        function createRoom() {
            const t = document.getElementById('admin-room-name').value;
            if (t) db.ref('rooms').push({ title: t });
            document.getElementById('admin-room-name').value = "";
        }

        function handleFileSelect(input, labelId, stateKey) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                state.tempFiles[stateKey] = e.target.result;
                document.getElementById(labelId).innerText = "✅ تم التحميل";
            };
            reader.readAsDataURL(input.files[0]);
        }

        function toggleMemberSub(view) {
            document.querySelectorAll('.member-subview').forEach(v => v.classList.add('hidden'));
            document.getElementById('subview-' + view).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-nav-' + view).classList.add('active');
        }

        function toggleAdminSub(view) {
            document.querySelectorAll('.admin-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById('admin-sub-' + view).classList.remove('hidden');
            document.querySelectorAll('.admin-tab').forEach(b => {
                b.classList.replace('bg-emerald-600', 'glass-ui');
                b.classList.replace('text-white', 'text-white/40');
            });
            event.currentTarget.classList.replace('glass-ui', 'bg-emerald-600');
            event.currentTarget.classList.replace('text-white/40', 'text-white');
        }

        async function sendOrder() {
            const target = document.getElementById('order-to').value;
            const msg = document.getElementById('order-body').value;
            const file = state.tempFiles['order_file'] || null;
            if (!target || !msg) return showNotif("أكمل التفاصيل");
            await db.ref('orders').push({ name: state.user.name, phone: state.user.phone, target, msg, file, time: Date.now() });
            showNotif("تم إرسال الطلب");
            document.getElementById('order-body').value = "";
            document.getElementById('order-to').value = "";
            state.tempFiles['order_file'] = null;
            document.getElementById('label-order-file').innerText = "📎 إرفاق ملف / صورة";
        }

        function zoomImg(src) {
            const z = document.createElement('div');
            z.className = "fixed inset-0 bg-black/95 z-[10001] flex flex-col items-center justify-center p-6 animate__animated animate__fadeIn";
            z.innerHTML = `<img src="${src}" class="max-w-full max-h-[80vh] rounded-2xl mb-8 shadow-2xl"><button class="bg-white text-black font-black px-12 py-4 rounded-2xl active:scale-90 transition-all">إغلاق العرض</button>`;
            z.onclick = () => z.remove();
            document.body.appendChild(z);
        }

        function systemLogout() {
            if(confirm("هل تريد تسجيل الخروج؟")) {
                localStorage.removeItem('arkan_session_v17');
                location.reload();
            }
        }
        // تفعيل خدمة الرسائل السحابية (FCM)
const messaging = firebase.messaging();

// طلب إذن الاشعارات من المتصفح
function requestNotificationPermission() {
    Notification.requestPermission().then((permission) => {
        if (permission === 'granted') {
            console.log('Notification permission granted.');
            // الحصول على التوكن الخاص بالجهاز
            messaging.getToken({ vapidKey: 'm58OJf1mYVHGuO1SJa2QydGIbL0gFnjQ6babKb5ayME' }).then((currentToken) => {
                if (currentToken) {
                    // خزن التوكن بقاعدة البيانات تحت اسم المستخدم حتى نكدر نرسله اشعار
                    if(state.user) {
                        db.ref('users/' + state.user.phone).update({ fcmToken: currentToken });
                    }
                }
            });
        }
    });
}

// تشغيل الطلب عند الدخول
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/firebase-messaging-sw.js')
    .then((registration) => {
        console.log('Service Worker registered');
        requestNotificationPermission();
    });
}

    </script>
